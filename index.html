<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PBS Quiz · Editor Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        /* ========== TEMAS ========== */
        :root {
            --bg-body: #f0f4fe;
            --bg-app: #ffffff;
            --bg-card: #f8faff;
            --bg-opt: #f8faff;
            --bg-opt-hover: #eef5ff;
            --bg-progress: #e6edf9;
            --bg-qtext: #f8faff;
            --bg-status: #f0f4fe;
            --bg-header: #e6edf9;
            --bg-opt-selected: #e2edff;
            --bg-opt-correct: #e2f7e8;
            --bg-opt-wrong: #ffe6e6;
            --bg-modal: white;
            --bg-result-item: #f8faff;
            --bg-result-correct: #f0faf3;
            --bg-result-wrong: #fdf0f0;
            --bg-scrollbar: #dde5f2;
            
            --text-primary: #0b1f3b;
            --text-secondary: #1a3457;
            --text-muted: #48638a;
            --text-light: #888;
            --text-placeholder: #aaa;
            --text-opt: #333;
            
            --border-color: #dde5f2;
            --border-light: #bccdf0;
            
            --shadow-app: 0 20px 40px rgba(0, 20, 50, 0.12);
            
            --color-primary: #2d7aff;
            --color-success: #0fa843;
            --color-danger: #d13a3a;
            --color-warning: #f59e0b;
            
            --opt-letter-bg: #e6edf9;
            --opt-letter-text: #1a3457;
            --badge-bg: #e2f7e8;
            --badge-text: #0fa843;
        }
        
        /* Modo AMOLED - segue o sistema do celular (preto puro #000) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #000000;
                --bg-app: #000000;
                --bg-card: #0a0a0a;
                --bg-opt: #0a0a0a;
                --bg-opt-hover: #141414;
                --bg-progress: #1a1a1a;
                --bg-qtext: #0a0a0a;
                --bg-status: #0a0a0a;
                --bg-header: #141414;
                --bg-opt-selected: #0d1f3a;
                --bg-opt-correct: #0a1a0f;
                --bg-opt-wrong: #1a0a0a;
                --bg-modal: #000000;
                --bg-result-item: #0a0a0a;
                --bg-result-correct: #0a1a0f;
                --bg-result-wrong: #1a0a0a;
                --bg-scrollbar: #1a1a2a;
                
                --text-primary: #e8edf5;
                --text-secondary: #c8d0e0;
                --text-muted: #667799;
                --text-light: #667799;
                --text-placeholder: #445566;
                --text-opt: #c8d0e0;
                
                --border-color: #1a1a2a;
                --border-light: #2a2a3a;
                
                --shadow-app: 0 20px 40px rgba(0, 0, 0, 0.8);
                
                --color-primary: #4a8aff;
                --color-success: #2ad86a;
                --color-danger: #ff5555;
                
                --opt-letter-bg: #1a1a2a;
                --opt-letter-text: #c8d0e0;
                --badge-bg: #0a1a0f;
                --badge-text: #2ad86a;
            }
        }
        
        /* Classe para forçar modo claro (sobrescreve o sistema) */
        .light-mode {
            --bg-body: #f0f4fe;
            --bg-app: #ffffff;
            --bg-card: #f8faff;
            --bg-opt: #f8faff;
            --bg-opt-hover: #eef5ff;
            --bg-progress: #e6edf9;
            --bg-qtext: #f8faff;
            --bg-status: #f0f4fe;
            --bg-header: #e6edf9;
            --bg-opt-selected: #e2edff;
            --bg-opt-correct: #e2f7e8;
            --bg-opt-wrong: #ffe6e6;
            --bg-modal: white;
            --bg-result-item: #f8faff;
            --bg-result-correct: #f0faf3;
            --bg-result-wrong: #fdf0f0;
            --bg-scrollbar: #dde5f2;
            
            --text-primary: #0b1f3b;
            --text-secondary: #1a3457;
            --text-muted: #48638a;
            --text-light: #888;
            --text-placeholder: #aaa;
            --text-opt: #333;
            
            --border-color: #dde5f2;
            --border-light: #bccdf0;
            
            --shadow-app: 0 20px 40px rgba(0, 20, 50, 0.12);
            
            --color-primary: #2d7aff;
            --color-success: #0fa843;
            --color-danger: #d13a3a;
            --color-warning: #f59e0b;
            
            --opt-letter-bg: #e6edf9;
            --opt-letter-text: #1a3457;
            --badge-bg: #e2f7e8;
            --badge-text: #0fa843;
        }
        
        /* Classe para forçar modo escuro AMOLED */
        .dark-mode {
            --bg-body: #000000;
            --bg-app: #000000;
            --bg-card: #0a0a0a;
            --bg-opt: #0a0a0a;
            --bg-opt-hover: #141414;
            --bg-progress: #1a1a1a;
            --bg-qtext: #0a0a0a;
            --bg-status: #0a0a0a;
            --bg-header: #141414;
            --bg-opt-selected: #0d1f3a;
            --bg-opt-correct: #0a1a0f;
            --bg-opt-wrong: #1a0a0a;
            --bg-modal: #000000;
            --bg-result-item: #0a0a0a;
            --bg-result-correct: #0a1a0f;
            --bg-result-wrong: #1a0a0a;
            --bg-scrollbar: #1a1a2a;
            
            --text-primary: #e8edf5;
            --text-secondary: #c8d0e0;
            --text-muted: #667799;
            --text-light: #667799;
            --text-placeholder: #445566;
            --text-opt: #c8d0e0;
            
            --border-color: #1a1a2a;
            --border-light: #2a2a3a;
            
            --shadow-app: 0 20px 40px rgba(0, 0, 0, 0.8);
            
            --color-primary: #4a8aff;
            --color-success: #2ad86a;
            --color-danger: #ff5555;
            
            --opt-letter-bg: #1a1a2a;
            --opt-letter-text: #c8d0e0;
            --badge-bg: #0a1a0f;
            --badge-text: #2ad86a;
        }

        body {
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }
        
        /* Scrollbar AMOLED */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-scrollbar);
            border-radius: 10px;
        }
        
        .app {
            max-width: 850px;
            width: 100%;
            background: var(--bg-app);
            border-radius: 40px;
            box-shadow: var(--shadow-app);
            padding: 28px 24px 32px;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 .app-name {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 .app-name .logo-img {
            height: 40px;
            width: auto;
            border-radius: 10px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .header-actions .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: 40px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-opt);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions .btn-sm:hover {
            background: var(--bg-opt-hover);
            border-color: var(--color-primary);
        }
        .header-actions .btn-sm.danger:hover {
            background: var(--bg-opt-wrong);
            border-color: var(--color-danger);
            color: var(--color-danger);
        }
        .sub {
            color: var(--text-muted);
            margin-bottom: 24px;
            padding-left: 14px;
            border-left: 4px solid var(--color-primary);
            font-weight: 500;
            transition: color 0.3s;
        }
        .progress-bar {
            background: var(--bg-progress);
            border-radius: 40px;
            height: 10px;
            margin-bottom: 24px;
            overflow: hidden;
            transition: background 0.3s;
        }
        .progress-fill {
            height: 100%;
            width: 3.33%;
            background: var(--color-primary);
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .qnum {
            background: var(--bg-header);
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .qtext {
            font-size: 1rem;
            color: var(--text-opt);
            margin-bottom: 20px;
            padding: 12px 16px;
            background: var(--bg-qtext);
            border-radius: 12px;
            border: 1.5px solid var(--border-color);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }
        .qtext .placeholder {
            color: var(--text-placeholder);
            font-style: italic;
        }
        .edit-btn {
            background: none;
            border: none;
            color: var(--color-primary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .edit-btn:hover {
            background: var(--bg-opt-hover);
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 22px;
        }
        .opt {
            background: var(--bg-opt);
            border: 2px solid var(--border-color);
            border-radius: 60px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.12s;
            position: relative;
        }
        .opt:hover {
            background: var(--bg-opt-hover);
            border-color: var(--border-light);
        }
        .opt .letter {
            width: 32px;
            height: 32px;
            background: var(--opt-letter-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--opt-letter-text);
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .opt .text {
            font-weight: 400;
            color: var(--text-opt);
            flex: 1;
            transition: color 0.3s;
        }
        .opt .text .placeholder {
            color: var(--text-placeholder);
            font-style: italic;
        }
        .opt.selected {
            border-color: var(--color-primary);
            background: var(--bg-opt-selected);
        }
        .opt.selected .letter {
            background: var(--color-primary);
            color: white;
        }
        .opt.correct {
            border-color: var(--color-success);
            background: var(--bg-opt-correct);
        }
        .opt.correct .letter {
            background: var(--color-success);
            color: white;
        }
        .opt.wrong {
            border-color: var(--color-danger);
            background: var(--bg-opt-wrong);
        }
        .opt.wrong .letter {
            background: var(--color-danger);
            color: white;
        }
        .opt .correct-badge {
            position: absolute;
            right: 16px;
            color: var(--badge-text);
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--badge-bg);
            padding: 2px 12px;
            border-radius: 20px;
            display: none;
            transition: all 0.3s;
        }
        .opt.correct .correct-badge {
            display: block;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 10px 0 18px;
        }
        .btn {
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            background: var(--bg-opt);
            color: var(--text-secondary);
            cursor: pointer;
            flex: 1 0 auto;
            transition: 0.1s;
            border: 1.5px solid var(--border-color);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-app);
            border-color: var(--text-primary);
        }
        .btn-primary:hover {
            background: var(--text-secondary);
        }
        .btn-primary:disabled {
            opacity: 0.45;
            pointer-events: none;
        }
        .btn-success {
            background: var(--color-success);
            color: white;
            border-color: var(--color-success);
        }
        .btn-success:hover {
            opacity: 0.85;
        }
        .btn-outline {
            border-color: var(--border-light);
        }
        .btn-outline:hover {
            background: var(--bg-opt-hover);
        }
        .btn-warning {
            background: var(--color-warning);
            color: white;
            border-color: var(--color-warning);
        }
        .btn-warning:hover {
            opacity: 0.85;
        }
        .btn-danger {
            background: var(--color-danger);
            color: white;
            border-color: var(--color-danger);
        }
        .btn-danger:hover {
            opacity: 0.85;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 2px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
            transition: border-color 0.3s;
        }
        .stats {
            display: flex;
            gap: 24px;
        }
        .stats span {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        .stats .green { color: var(--color-success); }
        .stats .red { color: var(--color-danger); }
        .reset-btn {
            background: transparent;
            border: 1.5px solid var(--border-light);
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background: var(--bg-opt-hover);
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--bg-modal);
            border-radius: 32px;
            padding: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: background 0.3s;
        }
        .modal h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal label {
            display: block;
            font-weight: 600;
            margin: 12px 0 4px;
            color: var(--text-secondary);
        }
        .modal input, .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
            background: var(--bg-opt);
            color: var(--text-opt);
        }
        .modal input:focus, .modal textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .modal textarea {
            resize: vertical;
            min-height: 50px;
        }
        .modal .option-inputs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px 0 16px;
        }
        .modal .option-inputs .opt-edit {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal .option-inputs .opt-edit .letter-label {
            font-weight: 700;
            color: var(--text-secondary);
            min-width: 24px;
        }
        .modal .option-inputs .opt-edit input {
            flex: 1;
        }
        .modal .option-inputs .opt-edit .remove-opt-btn {
            background: none;
            border: none;
            color: var(--color-danger);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .modal .option-inputs .opt-edit .remove-opt-btn:hover {
            background: var(--bg-opt-wrong);
        }
        .modal .add-opt-btn {
            background: var(--bg-opt);
            border: 1.5px dashed var(--border-light);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: 0.2s;
            margin-top: 4px;
        }
        .modal .add-opt-btn:hover {
            background: var(--bg-opt-hover);
            border-color: var(--color-primary);
        }
        .modal .answer-select {
            margin: 12px 0 20px;
        }
        .modal .answer-select select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 0.95rem;
            background: var(--bg-opt);
            color: var(--text-opt);
        }
        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .modal .modal-actions .btn {
            flex: 1;
        }
        .modal .modal-actions .btn-secondary {
            background: var(--bg-opt);
            color: var(--text-secondary);
            border-color: var(--border-color);
        }

        /* Resultado final */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(6px);
            padding: 20px;
        }
        .result-overlay.active {
            display: flex;
        }
        .result-modal {
            background: var(--bg-modal);
            border-radius: 32px;
            padding: 32px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transition: background 0.3s;
        }
        .result-modal h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .result-modal .result-summary {
            display: flex;
            gap: 30px;
            padding: 16px 0;
            margin: 12px 0 20px;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            flex-wrap: wrap;
            transition: border-color 0.3s;
        }
        .result-modal .result-summary .big-number {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .result-modal .result-summary .green { color: var(--color-success); }
        .result-modal .result-summary .red { color: var(--color-danger); }
        .result-modal .result-summary .gray { color: var(--text-light); }
        .result-modal .result-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }
        .result-modal .result-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            border-radius: 12px;
            background: var(--bg-result-item);
            border-left: 4px solid var(--border-color);
            transition: all 0.3s;
        }
        .result-modal .result-item.correct-item {
            border-left-color: var(--color-success);
            background: var(--bg-result-correct);
        }
        .result-modal .result-item.wrong-item {
            border-left-color: var(--color-danger);
            background: var(--bg-result-wrong);
        }
        .result-modal .result-item .status-icon {
            font-size: 1.2rem;
            min-width: 28px;
        }
        .result-modal .result-item .q-text {
            flex: 1;
            font-weight: 500;
            color: var(--text-primary);
        }
        .result-modal .result-item .q-answer {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .result-modal .result-item .q-your-answer {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .result-modal .result-item .q-your-answer.correct-answer { color: var(--color-success); }
        .result-modal .result-item .q-your-answer.wrong-answer { color: var(--color-danger); }
        .result-modal .result-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .result-modal .result-actions .btn {
            flex: 1;
        }
        
        .saved-badge {
            font-size: 0.7rem;
            color: var(--color-success);
            font-weight: 500;
        }
        
        /* Botão de tema */
        .theme-toggle {
            background: var(--bg-opt);
            border: 1.5px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .theme-toggle:hover {
            background: var(--bg-opt-hover);
            border-color: var(--color-primary);
        }
        
        @media (max-width: 480px) {
            .app { padding: 18px 14px; }
            .opt { padding: 12px 14px; }
            .btn { padding: 10px 16px; }
            .modal { padding: 20px; }
            .header-actions .btn-sm { font-size: 0.7rem; padding: 4px 10px; }
            .result-modal { padding: 20px; }
            .result-modal .result-summary { gap: 15px; }
            h1 .app-name .logo-img { height: 30px; }
            .stats { gap: 12px; }
            .stats span { font-size: 1rem; }
        }
    </style>
</head>
<body>

<!-- ========== APP ========== -->
<div class="app" id="app">
    <h1>
        <span class="app-name">
            <img src="https://i.ibb.co/1Gthz6G8/1783589755913.jpg" alt="PBS Quiz Logo" class="logo-img" id="logoImg">
            PBS Quiz
        </span>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle" title="Alternar tema"><i class="fas fa-moon"></i> <span id="themeLabel">Escuro</span></button>
            <button class="btn-sm" id="addQuestionBtn" title="Adicionar nova questão"><i class="fas fa-plus"></i> Questão</button>
            <button class="btn-sm danger" id="removeQuestionBtn" title="Remover questão atual"><i class="fas fa-trash"></i></button>
            <button class="btn-sm" id="editGlobalBtn" title="Editar questão atual"><i class="fas fa-pen"></i></button>
            <span class="saved-badge" id="savedBadge"><i class="fas fa-check-circle"></i> salvo</span>
        </div>
    </h1>
    <div class="sub" id="totalQuestionsDisplay">30 questões · 6 opções · <span style="color:var(--color-primary);">✓ verifica automaticamente</span></div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="question-header">
        <span class="qnum" id="qNumLabel">Q1</span>
        <span style="font-weight:500; color:var(--text-muted);" id="qCounter">1 / 30</span>
    </div>
    <div class="qtext" id="qText">
        <span class="placeholder">🔹 Clique em uma opção para marcar</span>
        <button class="edit-btn" id="editQuestionBtn" title="Editar pergunta">
            <i class="fas fa-pen"></i>
        </button>
    </div>

    <div class="options" id="optionsContainer"></div>

    <div class="actions">
        <button class="btn btn-outline" id="prevBtn" disabled>◀ Anterior</button>
        <button class="btn btn-primary" id="nextBtn">Próxima ▶</button>
        <button class="btn btn-success" id="checkBtn">✓ Verificar</button>
        <button class="btn btn-warning" id="finishBtn" style="flex:0.8;"><i class="fas fa-flag-checkered"></i> Finalizar</button>
    </div>

    <div class="footer">
        <div class="stats">
            <span>✅ <span class="green" id="correctCount">0</span></span>
            <span>❌ <span class="red" id="wrongCount">0</span></span>
            <span>📌 <span id="answeredCount">0</span>/<span id="totalCount">30</span></span>
            <span style="font-size:0.85rem; color:var(--text-light);"><i class="fas fa-rotate-right"></i> <span id="autoCheckStatus">automático</span></span>
        </div>
        <button class="reset-btn" id="resetBtn">⟳ Reiniciar</button>
    </div>
</div>

<!-- Modal de Edição -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>
            <span id="modalTitle">Editar Questão</span>
            <button class="btn-sm danger" id="modalRemoveQuestionBtn" title="Remover esta questão"><i class="fas fa-trash"></i></button>
        </h2>
        
        <label for="editQuestionText">Pergunta:</label>
        <textarea id="editQuestionText" placeholder="Digite a pergunta..."></textarea>
        
        <label>Opções:</label>
        <div class="option-inputs" id="editOptionsContainer">
            <!-- Gerado via JS -->
        </div>
        <button class="add-opt-btn" id="addOptionBtn"><i class="fas fa-plus"></i> Adicionar opção</button>
        
        <div class="answer-select">
            <label for="editCorrectAnswer">Resposta Correta:</label>
            <select id="editCorrectAnswer">
                <!-- Gerado via JS -->
            </select>
        </div>
        
        <div class="modal-actions">
            <button class="btn btn-secondary" id="modalCancelBtn">Cancelar</button>
            <button class="btn btn-primary" id="modalSaveBtn">Salvar</button>
        </div>
    </div>
</div>

<!-- Modal de Resultado Final -->
<div class="result-overlay" id="resultModal">
    <div class="result-modal">
        <h2>🏁 Resultado Final</h2>
        <div class="result-summary">
            <div><span class="big-number green" id="resultCorrect">0</span> <span style="font-weight:600;">acertos</span></div>
            <div><span class="big-number red" id="resultWrong">0</span> <span style="font-weight:600;">erros</span></div>
            <div><span class="big-number gray" id="resultTotal">0</span> <span style="font-weight:600;">respondidas</span></div>
            <div><span class="big-number" id="resultPercent" style="color:var(--color-primary);">0%</span> <span style="font-weight:600;">aproveitamento</span></div>
        </div>
        <div style="font-weight:600; margin-bottom:10px; color:var(--text-secondary);">Detalhamento das respostas:</div>
        <div class="result-details" id="resultDetails">
            <!-- Gerado via JS -->
        </div>
        <div class="result-actions">
            <button class="btn btn-secondary" id="resultCloseBtn">Fechar</button>
            <button class="btn btn-primary" id="resultResetBtn">Reiniciar tudo</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const STORAGE_KEY = 'pbs_quiz_data';
        const THEME_KEY = 'pbs_quiz_theme';
        
        // ========== TEMA ==========
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark-mode');
            
            if (isDark) {
                // Mudar para claro
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                localStorage.setItem(THEME_KEY, 'light');
                updateThemeUI(false);
            } else {
                // Mudar para escuro
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                localStorage.setItem(THEME_KEY, 'dark');
                updateThemeUI(true);
            }
        }
        
        function updateThemeUI(isDark) {
            const icon = document.querySelector('#themeToggle i');
            const label = document.getElementById('themeLabel');
            if (isDark) {
                icon.className = 'fas fa-sun';
                label.textContent = 'Claro';
            } else {
                icon.className = 'fas fa-moon';
                label.textContent = 'Escuro';
            }
        }
        
        function loadTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            const body = document.body;
            
            // Verificar se o sistema está em modo escuro
            const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (saved === 'dark') {
                body.classList.add('dark-mode');
                body.classList.remove('light-mode');
                updateThemeUI(true);
            } else if (saved === 'light') {
                body.classList.add('light-mode');
                body.classList.remove('dark-mode');
                updateThemeUI(false);
            } else {
                // Sem preferência salva -> seguir sistema
                if (systemDark) {
                    body.classList.add('dark-mode');
                    body.classList.remove('light-mode');
                    updateThemeUI(true);
                } else {
                    body.classList.add('light-mode');
                    body.classList.remove('dark-mode');
                    updateThemeUI(false);
                }
            }
        }
        
        // ========== LOCALSTORAGE ==========
        function saveToStorage() {
            const data = {
                questions: QUESTIONS,
                selected: selected,
                revealed: revealed,
                current: current
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            const badge = document.getElementById('savedBadge');
            badge.style.opacity = '1';
            setTimeout(() => { badge.style.opacity = '0.6'; }, 1000);
        }

        function loadFromStorage() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                if (data.questions && data.questions.length > 0) {
                    QUESTIONS = data.questions;
                    selected = data.selected || new Array(QUESTIONS.length).fill(null);
                    revealed = data.revealed || new Array(QUESTIONS.length).fill(false);
                    current = data.current || 0;
                    if (current >= QUESTIONS.length) current = QUESTIONS.length - 1;
                    if (selected.length !== QUESTIONS.length) {
                        selected = new Array(QUESTIONS.length).fill(null);
                        revealed = new Array(QUESTIONS.length).fill(false);
                    }
                    return true;
                }
            } catch (e) {
                console.log('Erro ao carregar dados');
            }
            return false;
        }

        // ========== DADOS ==========
        let QUESTIONS = [];
        let selected = [];
        let revealed = [];
        let current = 0;

        function initQuestions() {
            QUESTIONS = [];
            for (let i = 1; i <= 30; i++) {
                const opts = [];
                for (let j = 0; j < 6; j++) {
                    opts.push(`Opção ${LETTERS[j]}`);
                }
                QUESTIONS.push({
                    q: `Pergunta ${i}`,
                    opts: opts,
                    answer: Math.floor(Math.random() * 6)
                });
            }
            selected = new Array(QUESTIONS.length).fill(null);
            revealed = new Array(QUESTIONS.length).fill(false);
            current = 0;
        }

        if (!loadFromStorage()) {
            initQuestions();
        }

        let correctCount = 0;
        let wrongCount = 0;
        let editingQuestionIndex = 0;

        // DOM refs
        const qText = document.getElementById('qText');
        const optionsContainer = document.getElementById('optionsContainer');
        const qNumLabel = document.getElementById('qNumLabel');
        const qCounter = document.getElementById('qCounter');
        const progressFill = document.getElementById('progressFill');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');
        const correctSpan = document.getElementById('correctCount');
        const wrongSpan = document.getElementById('wrongCount');
        const answeredSpan = document.getElementById('answeredCount');
        const totalCount = document.getElementById('totalCount');
        const totalQuestionsDisplay = document.getElementById('totalQuestionsDisplay');
        const finishBtn = document.getElementById('finishBtn');
        const autoCheckStatus = document.getElementById('autoCheckStatus');
        const savedBadge = document.getElementById('savedBadge');
        const themeToggle = document.getElementById('themeToggle');
        
        // Result modal refs
        const resultModal = document.getElementById('resultModal');
        const resultCorrect = document.getElementById('resultCorrect');
        const resultWrong = document.getElementById('resultWrong');
        const resultTotal = document.getElementById('resultTotal');
        const resultPercent = document.getElementById('resultPercent');
        const resultDetails = document.getElementById('resultDetails');
        const resultCloseBtn = document.getElementById('resultCloseBtn');
        const resultResetBtn = document.getElementById('resultResetBtn');
        
        // Modal refs
        const modal = document.getElementById('editModal');
        const modalTitle = document.getElementById('modalTitle');
        const editQuestionText = document.getElementById('editQuestionText');
        const editOptionsContainer = document.getElementById('editOptionsContainer');
        const editCorrectAnswer = document.getElementById('editCorrectAnswer');
        const modalSaveBtn = document.getElementById('modalSaveBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalRemoveQuestionBtn = document.getElementById('modalRemoveQuestionBtn');
        const addOptionBtn = document.getElementById('addOptionBtn');
        const editQuestionBtn = document.getElementById('editQuestionBtn');
        const editGlobalBtn = document.getElementById('editGlobalBtn');
        const addQuestionBtn = document.getElementById('addQuestionBtn');
        const removeQuestionBtn = document.getElementById('removeQuestionBtn');

        // ========== TEMA EVENT ==========
        themeToggle.addEventListener('click', toggleTheme);
        loadTheme();

        // ========== AUTO-CHECK ==========
        function autoCheckQuestion(index) {
            if (revealed[index]) return;
            if (selected[index] === null) return;
            revealed[index] = true;
            updateStats();
            render();
            saveToStorage();
        }

        // ========== RENDER ==========
        function render() {
            if (QUESTIONS.length === 0) {
                qText.innerHTML = '<span style="color:var(--text-light);">Nenhuma questão. Clique em "+ Questão" para adicionar.</span>';
                optionsContainer.innerHTML = '';
                qNumLabel.textContent = 'Q0';
                qCounter.textContent = '0 / 0';
                progressFill.style.width = '0%';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                totalQuestionsDisplay.textContent = '0 questões · adicione suas perguntas';
                totalCount.textContent = '0';
                return;
            }

            if (current >= QUESTIONS.length) current = QUESTIONS.length - 1;
            if (current < 0) current = 0;

            const q = QUESTIONS[current];
            qNumLabel.textContent = `Q${current + 1}`;
            qCounter.textContent = `${current + 1} / ${QUESTIONS.length}`;
            totalCount.textContent = QUESTIONS.length;
            totalQuestionsDisplay.textContent = `${QUESTIONS.length} questões · ${q.opts.length} opções · ✓ verifica automaticamente`;
            
            // Pergunta
            const questionText = q.q || `Pergunta ${current + 1}`;
            qText.innerHTML = `
                <span>${questionText}</span>
                <button class="edit-btn" id="editQuestionBtn" title="Editar pergunta">
                    <i class="fas fa-pen"></i>
                </button>
            `;
            document.getElementById('editQuestionBtn').addEventListener('click', () => openModal(current));

            // Opções
            optionsContainer.innerHTML = '';
            const sel = selected[current] !== undefined ? selected[current] : null;
            const rev = revealed[current] !== undefined ? revealed[current] : false;
            
            q.opts.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'opt';
                if (sel === idx) div.classList.add('selected');
                if (rev) {
                    if (idx === q.answer) div.classList.add('correct');
                    else if (sel === idx && sel !== q.answer) div.classList.add('wrong');
                }
                
                const letterSpan = document.createElement('span');
                letterSpan.className = 'letter';
                letterSpan.textContent = LETTERS[idx] || '?';
                
                const textSpan = document.createElement('span');
                textSpan.className = 'text';
                textSpan.textContent = opt;
                
                const badge = document.createElement('span');
                badge.className = 'correct-badge';
                badge.textContent = '✓ Correta';
                
                div.appendChild(letterSpan);
                div.appendChild(textSpan);
                div.appendChild(badge);
                
                div.addEventListener('click', () => {
                    if (revealed[current]) return;
                    selected[current] = idx;
                    autoCheckQuestion(current);
                });
                
                optionsContainer.appendChild(div);
            });

            // Status da questão
            if (rev) {
                const statusMsg = document.createElement('div');
                statusMsg.style.cssText = `text-align:center; font-size:0.85rem; margin-top:-6px; padding:6px; border-radius:12px; background:var(--bg-status); color:var(--text-secondary);`;
                const isCorrect = sel === q.answer;
                statusMsg.innerHTML = isCorrect ? 
                    '✅ <span style="color:var(--color-success);font-weight:600;">Correta!</span>' : 
                    '❌ <span style="color:var(--color-danger);font-weight:600;">Errada!</span> A correta era ' + LETTERS[q.answer];
                optionsContainer.appendChild(statusMsg);
            }

            prevBtn.disabled = current === 0;
            nextBtn.disabled = current === QUESTIONS.length - 1;
            
            const pct = QUESTIONS.length > 0 ? ((current + 1) / QUESTIONS.length) * 100 : 0;
            progressFill.style.width = pct + '%';
        }

        function updateStats() {
            let answered = 0;
            let correct = 0;
            let wrong = 0;
            for (let i = 0; i < QUESTIONS.length; i++) {
                if (selected[i] !== null && revealed[i]) {
                    answered++;
                    if (selected[i] === QUESTIONS[i].answer) correct++;
                    else wrong++;
                }
            }
            correctCount = correct;
            wrongCount = wrong;
            correctSpan.textContent = correct;
            wrongSpan.textContent = wrong;
            answeredSpan.textContent = answered;
            
            const total = QUESTIONS.length;
            const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
            autoCheckStatus.textContent = answered === total ? '✅ completo' : `⚡ ${answered}/${total}`;
        }

        function checkCurrent() {
            if (QUESTIONS.length === 0) return;
            if (revealed[current]) return;
            if (selected[current] === null) {
                alert('Selecione uma opção primeiro!');
                return;
            }
            revealed[current] = true;
            updateStats();
            render();
            saveToStorage();
        }

        function goTo(index) {
            if (QUESTIONS.length === 0) return;
            if (index < 0) index = 0;
            if (index >= QUESTIONS.length) index = QUESTIONS.length - 1;
            current = index;
            render();
            saveToStorage();
        }

        // ============ RESULTADO FINAL ============
        function showFinalResult() {
            let answered = 0;
            for (let i = 0; i < QUESTIONS.length; i++) {
                if (selected[i] !== null && revealed[i]) answered++;
            }
            
            if (answered < QUESTIONS.length) {
                if (!confirm(`Você respondeu apenas ${answered} de ${QUESTIONS.length} questões. Deseja finalizar mesmo assim?`)) {
                    return;
                }
            }

            let correct = 0;
            let wrong = 0;
            let details = [];
            
            for (let i = 0; i < QUESTIONS.length; i++) {
                const q = QUESTIONS[i];
                const userAns = selected[i];
                const isRevealed = revealed[i];
                let status = 'nao-respondida';
                let isCorrect = false;
                
                if (isRevealed && userAns !== null) {
                    if (userAns === q.answer) {
                        status = 'correta';
                        isCorrect = true;
                        correct++;
                    } else {
                        status = 'errada';
                        wrong++;
                    }
                }
                
                details.push({
                    index: i,
                    question: q.q || `Pergunta ${i+1}`,
                    userAns: userAns,
                    correctAns: q.answer,
                    opts: q.opts,
                    status: status,
                    isCorrect: isCorrect
                });
            }

            resultCorrect.textContent = correct;
            resultWrong.textContent = wrong;
            resultTotal.textContent = correct + wrong;
            const totalAnswered = correct + wrong;
            const percent = totalAnswered > 0 ? Math.round((correct / totalAnswered) * 100) : 0;
            resultPercent.textContent = totalAnswered > 0 ? `${percent}%` : '—';
            
            resultDetails.innerHTML = '';
            details.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'result-item';
                
                let statusIcon = '⬜';
                let statusClass = '';
                let userAnswerText = 'Não respondida';
                let userAnswerClass = '';
                
                if (item.status === 'correta') {
                    statusIcon = '✅';
                    statusClass = 'correct-item';
                    userAnswerText = LETTERS[item.userAns] + ') ' + item.opts[item.userAns];
                    userAnswerClass = 'correct-answer';
                } else if (item.status === 'errada') {
                    statusIcon = '❌';
                    statusClass = 'wrong-item';
                    userAnswerText = LETTERS[item.userAns] + ') ' + item.opts[item.userAns];
                    userAnswerClass = 'wrong-answer';
                } else {
                    statusIcon = '⬜';
                    userAnswerText = 'Não respondida';
                    userAnswerClass = '';
                }
                
                const correctText = LETTERS[item.correctAns] + ') ' + item.opts[item.correctAns];
                
                div.className = `result-item ${statusClass}`;
                div.innerHTML = `
                    <span class="status-icon">${statusIcon}</span>
                    <span class="q-text">${item.question}</span>
                    <span class="q-answer">Correta: ${correctText}</span>
                    <span class="q-your-answer ${userAnswerClass}">Sua: ${userAnswerText}</span>
                `;
                resultDetails.appendChild(div);
            });

            resultModal.classList.add('active');
        }

        // ============ MODAL ============
        function openModal(index) {
            if (QUESTIONS.length === 0) {
                alert('Adicione uma questão primeiro!');
                return;
            }
            editingQuestionIndex = index;
            const q = QUESTIONS[index];
            modalTitle.textContent = `Editar Questão ${index + 1}`;
            editQuestionText.value = q.q || '';
            
            renderOptionInputs(q.opts);
            renderAnswerSelect(q.opts.length, q.answer);
            
            modal.classList.add('active');
        }

        function renderOptionInputs(opts) {
            editOptionsContainer.innerHTML = '';
            opts.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'opt-edit';
                const label = document.createElement('span');
                label.className = 'letter-label';
                label.textContent = LETTERS[idx] || '?';
                const input = document.createElement('input');
                input.type = 'text';
                input.value = opt;
                input.placeholder = `Opção ${LETTERS[idx] || idx + 1}`;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-opt-btn';
                removeBtn.innerHTML = '<i class="fas fa-times"></i>';
                removeBtn.title = 'Remover esta opção';
                removeBtn.addEventListener('click', () => {
                    if (opts.length <= 2) {
                        alert('Mínimo de 2 opções!');
                        return;
                    }
                    opts.splice(idx, 1);
                    renderOptionInputs(opts);
                    renderAnswerSelect(opts.length, Math.min(QUESTIONS[editingQuestionIndex].answer, opts.length - 1));
                });
                
                div.appendChild(label);
                div.appendChild(input);
                div.appendChild(removeBtn);
                editOptionsContainer.appendChild(div);
            });
        }

        function renderAnswerSelect(numOpts, selectedAnswer) {
            editCorrectAnswer.innerHTML = '';
            for (let i = 0; i < numOpts; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `${LETTERS[i] || i + 1}`;
                if (i === selectedAnswer) option.selected = true;
                editCorrectAnswer.appendChild(option);
            }
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function saveModal() {
            const index = editingQuestionIndex;
            const q = QUESTIONS[index];
            
            q.q = editQuestionText.value.trim() || `Pergunta ${index + 1}`;
            
            const inputs = editOptionsContainer.querySelectorAll('input');
            const newOpts = [];
            inputs.forEach((input) => {
                const val = input.value.trim();
                if (val) newOpts.push(val);
            });
            if (newOpts.length < 2) {
                alert('Mínimo de 2 opções!');
                return;
            }
            q.opts = newOpts;
            
            let answer = parseInt(editCorrectAnswer.value);
            if (answer >= q.opts.length) answer = q.opts.length - 1;
            q.answer = answer;
            
            selected[index] = null;
            revealed[index] = false;
            
            closeModal();
            render();
            updateStats();
            saveToStorage();
        }

        function addQuestion() {
            const numOpts = 4;
            const opts = [];
            for (let j = 0; j < numOpts; j++) {
                opts.push(`Opção ${LETTERS[j]}`);
            }
            QUESTIONS.push({
                q: `Pergunta ${QUESTIONS.length + 1}`,
                opts: opts,
                answer: 0
            });
            selected.push(null);
            revealed.push(false);
            current = QUESTIONS.length - 1;
            render();
            updateStats();
            saveToStorage();
        }

        function removeQuestion(index) {
            if (QUESTIONS.length <= 1) {
                alert('Mínimo de 1 questão!');
                return;
            }
            if (!confirm(`Remover a questão ${index + 1}?`)) return;
            QUESTIONS.splice(index, 1);
            selected.splice(index, 1);
            revealed.splice(index, 1);
            if (current >= QUESTIONS.length) current = QUESTIONS.length - 1;
            render();
            updateStats();
            saveToStorage();
        }

        function resetEverything() {
            if (!confirm('Resetar todas as respostas e estatísticas?')) return;
            selected = new Array(QUESTIONS.length).fill(null);
            revealed = new Array(QUESTIONS.length).fill(false);
            current = 0;
            render();
            updateStats();
            saveToStorage();
        }

        // ============ EVENTOS ============
        prevBtn.addEventListener('click', () => goTo(current - 1));
        nextBtn.addEventListener('click', () => goTo(current + 1));
        checkBtn.addEventListener('click', checkCurrent);
        finishBtn.addEventListener('click', showFinalResult);
        
        editGlobalBtn.addEventListener('click', () => {
            if (QUESTIONS.length === 0) {
                alert('Adicione uma questão primeiro!');
                return;
            }
            openModal(current);
        });
        
        addQuestionBtn.addEventListener('click', addQuestion);
        removeQuestionBtn.addEventListener('click', () => {
            if (QUESTIONS.length === 0) return;
            removeQuestion(current);
        });
        modalRemoveQuestionBtn.addEventListener('click', () => {
            removeQuestion(editingQuestionIndex);
            closeModal();
        });
        addOptionBtn.addEventListener('click', () => {
            const q = QUESTIONS[editingQuestionIndex];
            if (q.opts.length >= 26) {
                alert('Máximo de 26 opções!');
                return;
            }
            q.opts.push(`Opção ${LETTERS[q.opts.length] || q.opts.length + 1}`);
            renderOptionInputs(q.opts);
            renderAnswerSelect(q.opts.length, q.answer);
        });
        modalCancelBtn.addEventListener('click', closeModal);
        modalSaveBtn.addEventListener('click', saveModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        modal.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && e.ctrlKey) saveModal();
        });

        // Result modal events
        resultCloseBtn.addEventListener('click', () => {
            resultModal.classList.remove('active');
        });
        resultResetBtn.addEventListener('click', () => {
            resultModal.classList.remove('active');
            resetEverything();
        });
        resultModal.addEventListener('click', (e) => {
            if (e.target === resultModal) resultModal.classList.remove('active');
        });

        resetBtn.addEventListener('click', resetEverything);

        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('active')) return;
            if (resultModal.classList.contains('active')) {
                if (e.key === 'Escape') resultModal.classList.remove('active');
                return;
            }
            if (QUESTIONS.length === 0) return;
            if (e.key === 'ArrowLeft') goTo(current - 1);
            else if (e.key === 'ArrowRight') goTo(current + 1);
            else if (e.key === 'Enter') checkCurrent();
            else if (e.key === 'e' && e.ctrlKey) {
                e.preventDefault();
                openModal(current);
            }
        });

        render();
        updateStats();
        saveToStorage();
    })();
</script>
</body>
    </html>
